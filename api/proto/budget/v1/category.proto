syntax = "proto3";

package budget.v1;

option go_package = "github.com/chaowen/budget/gen/budget/v1;budgetv1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "budget/v1/common.proto";

// Category represents a spending/income category
message Category {
  string id = 1;
  string name = 2;
  TransactionType type = 3;  // expense or income
  string icon = 4;
  bool is_system = 5;  // System categories cannot be deleted
  google.protobuf.Timestamp created_at = 6;
}

// ListCategoriesRequest
message ListCategoriesRequest {
  TransactionType type = 1;  // Optional filter by type
}

message ListCategoriesResponse {
  repeated Category categories = 1;
}

// CreateCategoryRequest
message CreateCategoryRequest {
  string name = 1;
  TransactionType type = 2;
  string icon = 3;
}

message CreateCategoryResponse {
  Category category = 1;
}

// GetCategoryRequest
message GetCategoryRequest {
  string id = 1;
}

message GetCategoryResponse {
  Category category = 1;
}

// UpdateCategoryRequest
message UpdateCategoryRequest {
  string id = 1;
  string name = 2;
  string icon = 3;
}

message UpdateCategoryResponse {
  Category category = 1;
}

// DeleteCategoryRequest
message DeleteCategoryRequest {
  string id = 1;
}

message DeleteCategoryResponse {}

// CategoryService manages spending/income categories
service CategoryService {
  // List all categories (system + user custom)
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse) {
    option (google.api.http) = {
      get: "/api/v1/categories"
    };
  }

  // Create a custom category
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse) {
    option (google.api.http) = {
      post: "/api/v1/categories"
      body: "*"
    };
  }

  // Get a category by ID
  rpc GetCategory(GetCategoryRequest) returns (GetCategoryResponse) {
    option (google.api.http) = {
      get: "/api/v1/categories/{id}"
    };
  }

  // Update a custom category
  rpc UpdateCategory(UpdateCategoryRequest) returns (UpdateCategoryResponse) {
    option (google.api.http) = {
      patch: "/api/v1/categories/{id}"
      body: "*"
    };
  }

  // Delete a custom category
  rpc DeleteCategory(DeleteCategoryRequest) returns (DeleteCategoryResponse) {
    option (google.api.http) = {
      delete: "/api/v1/categories/{id}"
    };
  }
}
